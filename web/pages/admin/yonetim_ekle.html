<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bellona | Yeni Personel Kaydı</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../js_files/admin.css">
</head>
<body>
    <aside class="sidebar">
        <div class="logo">
            <img src="../../assets/bellona-logo.svg" alt="Bellona Logo" class="brand-logo">
        </div>
        <nav class="sidebar-nav">
            <a href="yonetim.html" class="nav-item"><i class="fa-solid fa-gauge"></i> Dashboard</a>
            <a href="yonetim_personel.html" class="nav-item"><i class="fa-solid fa-users"></i> Personel Listesi</a>
            <a href="yonetim_ekle.html" class="nav-item active"><i class="fa-solid fa-user-plus"></i> Yeni Kayıt</a>
            <a href="yonetim_mesajlar.html" class="nav-item"><i class="fa-solid fa-envelope-open-text"></i> Tüm Mesajlar</a>
        </nav>
    </aside>

    <main>
        <header>
            <h1>Onboarding / Personel Kaydı</h1>
            <a href="yonetim_mesajlar.html" class="btn-outline"><i class="fa-solid fa-timeline"></i> Audit Akışı</a>
        </header>

        <div class="card form-shell" style="padding: 2.5rem;">
            <form id="addUserForm">
                <div class="form-section-head"><i class="fa-solid fa-user"></i> Kişisel Bilgiler</div>
                <div class="form-grid">
                    <div class="form-group form-group-card">
                        <label>Ad</label>
                        <div class="input-box"><i class="fa-solid fa-user-tag"></i>                        <input type="text" id="newName" name="newName" placeholder="Adını giriniz" required /></div>
                    </div>
                    <div class="form-group form-group-card">
                        <label>Soyad</label>
                        <div class="input-box"><i class="fa-solid fa-user-tag"></i>                        <input type="text" id="newSurname" name="newSurname" placeholder="Soyadını giriniz" required /></div>
                    </div>
                    <div class="form-group form-group-card">
                        <label>Doğum Tarihi</label>
                        <div class="input-box"><i class="fa-solid fa-calendar-days"></i>                        <input type="date" id="newBirth" name="newBirth" required /></div>
                    </div>
                    <div class="form-group form-group-card">
                        <label>Telefon Numarası</label>
                        <div class="input-box">
                            <i class="fa-solid fa-phone"></i>
                            <input type="tel" id="newPhone" name="newPhone" placeholder="+90 5xx xxx xx xx" pattern="^\+90\s5\d{2}\s\d{3}\s\d{2}\s\d{2}$" required />
                        </div>
                    </div>
                </div>

                <div class="form-section-head"><i class="fa-solid fa-building"></i> İş Bilgileri</div>
                <div class="form-grid">
                    <div class="form-group form-group-card">
                        <label>Hizmet Kategorisi</label>
                        <div class="input-box"><i class="fa-solid fa-sitemap"></i>
                                                        <select id="newCategory" name="category">
                                <option value="factory">Fabrika (Merkez)</option>
                                <option value="regional">Bölge Bayisi</option>
                                <option value="local">Yerel Bayi</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group form-group-card">
                        <label>Bölge</label>
                        <div class="input-box"><i class="fa-solid fa-map-location-dot"></i>
                                                        <select id="newRegion" name="region" required>
                                <option value="" disabled selected>Bölge seçiniz</option>
                                <option value="Marmara">Marmara</option>
                                <option value="Ege">Ege</option>
                                <option value="İç Anadolu">İç Anadolu</option>
                                <option value="Akdeniz">Akdeniz</option>
                                <option value="Karadeniz">Karadeniz</option>
                                <option value="Doğu Anadolu">Doğu Anadolu</option>
                                <option value="Güneydoğu Anadolu">Güneydoğu Anadolu</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group form-group-card" id="companyGroup">
                        <label>Bayi / Şirket Adı</label>
                        <div class="input-box">
                            <i class="fa-solid fa-building"></i>
                            <!-- Yerel Bayi için normal input -->
                                                        <input type="text" id="newCompany" name="company" placeholder="Bayi adını giriniz" required />
                            
                            <!-- Bölge Bayi için özel dropdown (başlangıçta gizli) -->
                                                        <select id="newRegionCompany" name="regionCompany" style="display:none;">
                                <option value="" disabled selected>Grup seçiniz</option>
                                <option value="Karavil Group">Karavil Group (Abdulkadir Karavil)</option>
                                <option value="Yılmaz Group">Yılmaz Group (Ercan Yılmaz)</option>
                                <option value="Gümüşbağlar Şirket Birliği">Gümüşbağlar Şirket Birliği (Abdullah Gümüşbağlar)</option>
                                <option value="Aydın Group">Aydın Group (Kenan Aydın)</option>
                                <option value="Karavil Marmara">Karavil Marmara (Yılmaz Karavil)</option>
                                <option value="Atasaylar Group">Atasaylar Group (Kenan Atasay)</option>
                                <option value="Kırklar Şirketler Birliği">Kırklar Şirketler Birliği (Hakan Kırklar)</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group form-group-card">
                        <label>Rol & Yetki Hiyerarşisi</label>
                        <div class="input-box"><i class="fa-solid fa-user-shield"></i>
                                                    <select id="newSubRole" name="subRole">
                                <option value="manager">Yönetici / Müdür / Patron</option>
                                <option value="employee">Personel / Çalışan</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group form-group-card" id="deptGroup" style="display: none;">
                        <label>Departman / Birim</label>
                        <div class="input-box">
                            <i class="fa-solid fa-briefcase"></i>
                            <select id="newDept" name="newDept">
                                <option value="">Departman Seçiniz...</option>
                                <!-- Fabrika Birimleri -->
                                <optgroup label="Fabrika Birimleri" id="optFactory">
                                    <option value="Fabrika Üretim Hattı">Fabrika Üretim Hattı</option>
                                    <option value="Fabrika Ar-Ge Merkezi">Fabrika Ar-Ge Merkezi</option>
                                    <option value="Fabrika Lojistik Birimi">Fabrika Lojistik Birimi</option>
                                    <option value="Fabrika Kalite Kontrol">Fabrika Kalite Kontrol</option>
                                    <option value="Fabrika İnsan Kaynakları">Fabrika İnsan Kaynakları</option>
                                    <option value="Fabrika Muhasebe">Fabrika Muhasebe</option>
                                </optgroup>
                                <!-- Bölge Birimleri -->
                                <optgroup label="Bölge Bayi Birimleri" id="optRegional">
                                    <option value="Bölge Pazarlama Sorumlusu">Bölge Pazarlama Sorumlusu</option>
                                    <option value="Bölge Muhasebe Müdürü">Bölge Muhasebe Müdürü</option>
                                    <option value="Bölge Sevkiyat Koordinatörü">Bölge Sevkiyat Koordinatörü</option>
                                    <option value="Bölge Satış Yönetimi">Bölge Satış Yönetimi</option>
                                </optgroup>
                                <!-- Yerel Birimler -->
                                <optgroup label="Yerel Mağaza Birimleri" id="optLocal">
                                    <option value="Mağaza Satış Temsilcisi">Mağaza Satış Temsilcisi</option>
                                    <option value="Mağaza Muhasebe">Mağaza Muhasebe</option>
                                    <option value="Mağaza Teknik Servis">Mağaza Teknik Servis</option>
                                    <option value="Mağaza Depo Sorumlusu">Mağaza Depo Sorumlusu</option>
                                </optgroup>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-section-head"><i class="fa-solid fa-lock"></i> Hesap Bilgileri</div>
                <div class="form-grid">
                    <div class="form-group form-group-card">
                        <label>Kurumsal E-posta <small>(Otomatik oluşur)</small></label>
                        <div class="input-box"><i class="fa-solid fa-at"></i><input type="text" id="newEmail" readonly placeholder="ad.soyad@bellona.com.tr" /></div>
                    </div>
                    <div class="form-group form-group-card">
                        <label>Şifre</label>
                        <div class="input-box" style="position:relative;">
                            <i class="fa-solid fa-key"></i>
                            <input type="text" id="newPassword" readonly />
                            <button type="button" id="btnCopyUserPw" style="position:absolute; right:8px; top:50%; transform:translateY(-50%); border:none; background:rgba(46, 139, 87, 0.1); color:var(--primary-light); border-radius:6px; padding:6px 12px; cursor:pointer; font-size:0.75rem; font-weight:700;">Kopyala</button>
                        </div>
                    </div>
                </div>

                <div style="margin-top: 2rem;">
                    <button type="submit" class="btn-submit-premium" id="addUserBtn">
                        <i class="fa-solid fa-rocket"></i> Personel Kaydını Tamamla
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script src="../../js_files/admin_logic.js" type="module"></script>
    <script type="module">
        import { generateStrictPassword } from '../../js_files/admin_logic.js';
        const btnCopy = document.getElementById('btnCopyUserPw');
        const pwIn = document.getElementById('newPassword');
        if(btnCopy) {
            btnCopy.addEventListener('click', () => {
                navigator.clipboard.writeText(pwIn.value).then(() => {
                    btnCopy.textContent = 'Kopyalandı!';
                    setTimeout(() => btnCopy.textContent = 'Kopyala', 2000);
                });
            });
        }
    </script>
</body>
</html>
