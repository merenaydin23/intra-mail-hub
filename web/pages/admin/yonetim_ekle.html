<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bellona | Yeni Personel Kaydı</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../js_files/admin.css">
</head>
<body>
    <aside class="sidebar">
        <div class="logo">
            <img src="../../assets/bellona-logo.svg" alt="Bellona Logo" class="brand-logo">
        </div>
        <nav class="sidebar-nav">
            <a href="yonetim.html" class="nav-item"><i class="fa-solid fa-gauge"></i> Dashboard</a>
            <a href="yonetim_personel.html" class="nav-item"><i class="fa-solid fa-users"></i> Personel Listesi</a>
            <a href="yonetim_ekle.html" class="nav-item active"><i class="fa-solid fa-user-plus"></i> Yeni Kayıt</a>
            <a href="yonetim_mesajlar.html" class="nav-item"><i class="fa-solid fa-envelope-open-text"></i> Tüm Mesajlar</a>
            <a href="yonetim_audit.html" class="nav-item"><i class="fa-solid fa-timeline"></i> İşlem Geçmişi</a>
            <div class="sidebar-logout">
                <a href="../../index.html" class="nav-item" style="color: #ef4444;"><i class="fa-solid fa-right-from-bracket"></i> Çıkış Yap</a>
            </div>
        </nav>
    </aside>

    <main>
        <header>
            <div>
                <h1>Yeni Personel Kaydı</h1>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 0.4rem;">Sisteme yeni bir kullanıcı ekleyin. E-posta ve şifre otomatik olarak oluşturulacaktır.</p>
            </div>
            <a href="yonetim_mesajlar.html" class="btn-outline"><i class="fa-solid fa-timeline"></i> Audit Akışı</a>
        </header>

        <div class="form-shell">
            <form id="addUserForm">
                <!-- 1. KİŞİSEL BİLGİLER -->
                <div class="card" style="padding: 2rem; margin-bottom: 2rem;">
                    <div class="form-section-head" style="margin-top: 0;"><i class="fa-solid fa-user-plus"></i> Kişisel Bilgiler</div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Ad</label>
                            <div class="input-box">
                                <i class="fa-solid fa-user"></i>
                                <input type="text" id="newName" name="newName" placeholder="Örn: Ahmet" required />
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Soyad</label>
                            <div class="input-box">
                                <i class="fa-solid fa-user"></i>
                                <input type="text" id="newSurname" name="newSurname" placeholder="Örn: Yılmaz" required />
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Doğum Tarihi</label>
                            <div class="input-box">
                                <i class="fa-solid fa-calendar-day"></i>
                                <input type="date" id="newBirth" name="newBirth" required />
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Telefon</label>
                            <div class="input-box">
                                <i class="fa-solid fa-phone"></i>
                                <input type="tel" id="newPhone" name="newPhone" placeholder="+90 5xx xxx xx xx" pattern="^\+90\s?5\d{2}\s?\d{3}\s?\d{2}\s?\d{2}$" required />
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 2. İŞ BİLGİLERİ -->
                <div class="card" style="padding: 2rem; margin-bottom: 2rem;">
                    <div class="form-section-head" style="margin-top: 0;"><i class="fa-solid fa-building-user"></i> İş & Görev Bilgileri</div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Hizmet Kategorisi</label>
                            <div class="input-box">
                                <i class="fa-solid fa-sitemap"></i>
                                <select id="newCategory" name="category">
                                    <option value="factory">Fabrika (Merkez)</option>
                                    <option value="regional">Bölge Bayisi</option>
                                    <option value="local">Yerel Bayi</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Bölge</label>
                            <div class="input-box">
                                <i class="fa-solid fa-map"></i>
                                <select id="newRegion" name="region" required>
                                    <option value="" disabled selected>Seçiniz...</option>
                                    <option value="Marmara">Marmara</option>
                                    <option value="Ege">Ege</option>
                                    <option value="İç Anadolu">İç Anadolu</option>
                                    <option value="Akdeniz">Akdeniz</option>
                                    <option value="Karadeniz">Karadeniz</option>
                                    <option value="Doğu Anadolu">Doğu Anadolu</option>
                                    <option value="Güneydoğu Anadolu">Güneydoğu Anadolu</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group" id="cityGroup">
                            <label>Şehir</label>
                            <div class="input-box">
                                <i class="fa-solid fa-city"></i>
                                <select id="newCity" name="city" required>
                                    <option value="" disabled selected>Önce bölge seçin</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group" id="companyGroup">
                            <label>Bayi / Şirket Adı</label>
                            <div class="input-box">
                                <i class="fa-solid fa-store"></i>
                                <select id="companySelect" style="display:none;"></select>
                                <input type="text" id="newCompany" name="company" placeholder="Şirket adını yazın" required />
                                <select id="newRegionCompany" name="regionCompany" style="display:none;"></select>
                            </div>
                        </div>
                        <div class="form-group" id="dealerCodeGroup">
                            <label>Bayi Kodu</label>
                            <div class="input-box">
                                <i class="fa-solid fa-hashtag"></i>
                                <input type="number" id="newDealerCode" name="dealerCode" placeholder="Kod girin" required />
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Yetki Seviyesi</label>
                            <div class="input-box">
                                <i class="fa-solid fa-user-shield"></i>
                                <select id="newSubRole" name="subRole">
                                    <option value="manager">Yönetici / Patron</option>
                                    <option value="employee">Çalışan / Personel</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group" id="deptGroup" style="display: none; margin-top: 1.5rem;">
                        <label>Departman / Birim</label>
                        <div class="input-box">
                            <i class="fa-solid fa-briefcase"></i>
                            <select id="newDept" name="newDept">
                                <option value="">Seçiniz...</option>
                                <optgroup label="Fabrika Birimleri" id="optFactory"></optgroup>
                                <optgroup label="Bölge Birimleri" id="optRegional"></optgroup>
                                <optgroup label="Yerel Mağaza Birimleri" id="optLocal"></optgroup>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- 3. HESAP BİLGİLERİ -->
                <div class="card" style="padding: 2rem; border-left: 4px solid var(--brand);">
                    <div class="form-section-head" style="margin-top: 0;"><i class="fa-solid fa-shield-halved"></i> Otomatik Oluşturulan Hesap</div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Kurumsal E-posta</label>
                            <div class="input-box">
                                <i class="fa-solid fa-at"></i>
                                <input type="text" id="newEmail" readonly placeholder="ad.soyad@bellona.com.tr" />
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Geçici Şifre</label>
                            <div class="input-box" style="position:relative;">
                                <i class="fa-solid fa-key"></i>
                                <input type="text" id="newPassword" readonly />
                                <button type="button" id="btnCopyUserPw" style="position:absolute; right:8px; top:50%; transform:translateY(-50%); border:none; background:var(--brand-soft); color:var(--brand); border-radius:6px; padding:6px 12px; cursor:pointer; font-size:0.7rem; font-weight:800;">KOPYALA</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div style="margin-top: 2.5rem; text-align: center;">
                    <button type="submit" class="btn-submit-premium" id="addUserBtn">
                        <i class="fa-solid fa-check-double"></i> Personel Kaydını Sisteme Aktar
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script src="../../js_files/admin_logic.js" type="module"></script>
    <script type="module">
        import { generateStrictPassword } from '../../js_files/admin_logic.js';
        const btnCopy = document.getElementById('btnCopyUserPw');
        const pwIn = document.getElementById('newPassword');
        if(btnCopy) {
            btnCopy.addEventListener('click', () => {
                navigator.clipboard.writeText(pwIn.value).then(() => {
                    btnCopy.textContent = 'Kopyalandı!';
                    setTimeout(() => btnCopy.textContent = 'Kopyala', 2000);
                });
            });
        }
    </script>
</body>
</html>
