<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bellona | Mesaj Merkezi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../js_files/admin.css">
    <style>
        /* ── MSG HUB LAYOUT ── */
        .msg-hub { display: grid; grid-template-columns: 380px 1fr; gap: 1.5rem; height: calc(100vh - 220px); min-height: 500px; }

        /* ── LEFT PANEL ── */
        .msg-panel-left { display: flex; flex-direction: column; background: #fff; border-radius: 16px; border: 1px solid #e2e8f0; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.05); }
        .msg-panel-toolbar { padding: 1rem; border-bottom: 1px solid #f1f5f9; display: flex; flex-direction: column; gap: 0.6rem; }
        .msg-search-box { display: flex; align-items: center; gap: 0.5rem; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 0.55rem 0.9rem; }
        .msg-search-box input { border: none; background: transparent; outline: none; font-size: 0.85rem; width: 100%; color: #1e293b; }
        .msg-search-box i { color: #94a3b8; font-size: 0.85rem; }
        .msg-filter-row { display: flex; gap: 0.5rem; }
        .msg-filter-btn { flex: 1; padding: 0.4rem 0.5rem; border: 1px solid #e2e8f0; border-radius: 8px; background: #f8fafc; font-size: 0.75rem; font-weight: 600; color: #64748b; cursor: pointer; transition: all 0.2s; text-align: center; }
        .msg-filter-btn.active { background: #007b7b; color: #fff; border-color: #007b7b; }
        .msg-filter-btn:hover:not(.active) { background: #e2e8f0; }

        .msg-list-body { flex: 1; overflow-y: auto; }
        .msg-list-body::-webkit-scrollbar { width: 4px; }
        .msg-list-body::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

        .msg-card { padding: 0.9rem 1rem; border-bottom: 1px solid #f1f5f9; cursor: pointer; transition: background 0.15s; position: relative; }
        .msg-card:hover { background: #f8fafc; }
        .msg-card.active { background: #f0fdfd; border-left: 3px solid #007b7b; }
        .msg-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.3rem; }
        .msg-card-sender { font-weight: 700; font-size: 0.85rem; color: #1e293b; }
        .msg-card-time { font-size: 0.72rem; color: #94a3b8; white-space: nowrap; }
        .msg-card-subject { font-size: 0.82rem; color: #334155; font-weight: 600; margin-bottom: 0.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .msg-card-preview { font-size: 0.77rem; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .msg-card-badge { position: absolute; top: 0.9rem; right: 1rem; }
        .tag-bulk { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; background: #fef3c7; color: #92400e; font-weight: 700; }
        .tag-attach { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; background: #ede9fe; color: #5b21b6; font-weight: 700; margin-left: 4px; }

        .msg-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #94a3b8; padding: 2rem; text-align: center; }
        .msg-empty i { font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.3; }

        /* ── RIGHT PANEL ── */
        .msg-panel-right { background: #fff; border-radius: 16px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.05); }
        .msg-detail-placeholder { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94a3b8; }
        .msg-detail-placeholder i { font-size: 3rem; margin-bottom: 1rem; opacity: 0.2; }

        .msg-detail-view { display: flex; flex-direction: column; height: 100%; }
        .msg-detail-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid #f1f5f9; }
        .msg-detail-subject { font-size: 1.1rem; font-weight: 800; color: #0f172a; margin-bottom: 0.75rem; }
        .msg-detail-meta { display: flex; gap: 1.5rem; flex-wrap: wrap; }
        .msg-meta-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; color: #64748b; }
        .msg-meta-item i { color: #007b7b; }
        .msg-meta-item strong { color: #1e293b; }

        .msg-detail-body { flex: 1; overflow-y: auto; padding: 1.5rem; }
        .msg-detail-body::-webkit-scrollbar { width: 4px; }
        .msg-detail-body::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .msg-body-text { font-size: 0.9rem; color: #334155; line-height: 1.8; white-space: pre-wrap; background: #f8fafc; border-radius: 12px; padding: 1.25rem; border: 1px solid #e2e8f0; }

        .msg-attachment-box { margin-top: 1rem; background: #f0fdfd; border: 1px solid #99f6e4; border-radius: 12px; padding: 0.9rem 1.1rem; display: flex; align-items: center; gap: 0.8rem; }
        .msg-attachment-box i { font-size: 1.4rem; color: #007b7b; }
        .msg-attachment-box a { font-size: 0.85rem; font-weight: 600; color: #007b7b; text-decoration: none; }
        .msg-attachment-box a:hover { text-decoration: underline; }
        .msg-attachment-name { font-size: 0.8rem; color: #64748b; }

        .msg-replies-section { margin-top: 1.25rem; }
        .msg-replies-section h4 { font-size: 0.8rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid #f1f5f9; }
        .reply-item { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 0.75rem 1rem; margin-bottom: 0.5rem; }
        .reply-item-header { display: flex; justify-content: space-between; margin-bottom: 0.4rem; }
        .reply-item-author { font-size: 0.8rem; font-weight: 700; color: #007b7b; }
        .reply-item-time { font-size: 0.75rem; color: #94a3b8; }
        .reply-item-text { font-size: 0.85rem; color: #475569; }

        /* ── STATS BAR ── */
        .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-chip { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 0.9rem 1.2rem; display: flex; align-items: center; gap: 0.8rem; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
        .stat-chip-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
        .stat-chip-info { min-width: 0; }
        .stat-chip-label { font-size: 0.72rem; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
        .stat-chip-value { font-size: 1.2rem; font-weight: 800; color: #0f172a; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">
            <img src="../../assets/bellona-logo.svg" alt="Bellona Logo" class="brand-logo">
        </div>
        <nav class="sidebar-nav">
            <a href="yonetim.html" class="nav-item"><i class="fa-solid fa-gauge"></i> Dashboard</a>
            <a href="yonetim_personel.html" class="nav-item"><i class="fa-solid fa-users"></i> Personel Listesi</a>
            <a href="yonetim_ekle.html" class="nav-item"><i class="fa-solid fa-user-plus"></i> Yeni Kayıt</a>
            <a href="yonetim_mesajlar.html" class="nav-item active"><i class="fa-solid fa-envelope-open-text"></i> Tüm Mesajlar</a>
            <div class="sidebar-logout">
                <a href="../../index.html" class="nav-item" style="color: #ef4444;"><i class="fa-solid fa-right-from-bracket"></i> Çıkış Yap</a>
            </div>
        </nav>
    </aside>

    <main>
        <header>
            <h1><i class="fa-solid fa-comments" style="margin-right:8px;"></i> Mesaj Merkezi</h1>
            <div class="header-actions">
                <button id="btnExportCSV" class="btn-outline">
                    <i class="fa-solid fa-file-csv"></i> Rapor İndir
                </button>
                <div class="user-pill"><i class="fa-solid fa-user-shield"></i> Bellona Admin</div>
            </div>
        </header>

        <!-- İstatistik Barı -->
        <div class="stats-bar">
            <div class="stat-chip">
                <div class="stat-chip-icon" style="background:#eef2ff; color:#4f46e5;"><i class="fa-solid fa-paper-plane"></i></div>
                <div class="stat-chip-info">
                    <div class="stat-chip-label">Bugün Gelen</div>
                    <div class="stat-chip-value" id="todayCount">--</div>
                </div>
            </div>
            <div class="stat-chip">
                <div class="stat-chip-icon" style="background:#ecfdf5; color:#059669;"><i class="fa-solid fa-envelope"></i></div>
                <div class="stat-chip-info">
                    <div class="stat-chip-label">Toplam Mesaj</div>
                    <div class="stat-chip-value" id="totalCount">--</div>
                </div>
            </div>
            <div class="stat-chip">
                <div class="stat-chip-icon" style="background:#fffbeb; color:#d97706;"><i class="fa-solid fa-map-location-dot"></i></div>
                <div class="stat-chip-info">
                    <div class="stat-chip-label">En Aktif Bölge</div>
                    <div class="stat-chip-value" id="activeRegion" style="font-size:0.9rem;">--</div>
                </div>
            </div>
            <div class="stat-chip">
                <div class="stat-chip-icon" style="background:#fdf2f8; color:#9333ea;"><i class="fa-solid fa-bolt"></i></div>
                <div class="stat-chip-info">
                    <div class="stat-chip-label">Yoğunluk</div>
                    <div class="stat-chip-value" id="liveIntensity" style="font-size:0.95rem;">--</div>
                </div>
            </div>
        </div>

        <!-- Ana Hub -->
        <div class="msg-hub">
            <!-- SOL: Liste Paneli -->
            <div class="msg-panel-left">
                <div class="msg-panel-toolbar">
                    <div class="msg-search-box">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="msgSearch" placeholder="Gönderen, alıcı veya konu ara..." />
                    </div>
                    <div class="msg-filter-row">
                        <button class="msg-filter-btn active" data-filter="all">Tümü</button>
                        <button class="msg-filter-btn" data-filter="bulk">Toplu</button>
                        <button class="msg-filter-btn" data-filter="attach">Ekli</button>
                        <button class="msg-filter-btn" data-filter="today">Bugün</button>
                    </div>
                </div>
                <div class="msg-list-body" id="msgListBody">
                    <div class="msg-empty"><i class="fa-solid fa-spinner fa-spin"></i><p>Mesajlar yükleniyor...</p></div>
                </div>
            </div>

            <!-- SAĞ: Detay Paneli -->
            <div class="msg-panel-right" id="msgDetailPanel">
                <div class="msg-detail-placeholder" id="msgPlaceholder">
                    <i class="fa-regular fa-envelope-open"></i>
                    <h3 style="font-family:'Outfit'; font-weight:700; color:#cbd5e1;">Mesaj seçin</h3>
                    <p style="font-size:0.85rem;">Detaylarını görmek için soldan bir mesaj seçin.</p>
                </div>
                <div class="msg-detail-view" id="msgDetailView" style="display:none;">
                    <div class="msg-detail-header">
                        <div class="msg-detail-subject" id="detSubject">—</div>
                        <div class="msg-detail-meta">
                            <div class="msg-meta-item"><i class="fa-solid fa-user"></i> <strong id="detSender">—</strong></div>
                            <div class="msg-meta-item"><i class="fa-solid fa-arrow-right"></i> <strong id="detReceiver">—</strong></div>
                            <div class="msg-meta-item"><i class="fa-regular fa-clock"></i> <span id="detTime">—</span></div>
                            <div class="msg-meta-item"><i class="fa-solid fa-tag"></i> <span id="detStatus">—</span></div>
                        </div>
                    </div>
                    <div class="msg-detail-body">
                        <div class="msg-body-text" id="detBody">—</div>
                        <div id="detAttachment" style="display:none;" class="msg-attachment-box">
                            <i class="fa-solid fa-paperclip"></i>
                            <div>
                                <div class="msg-attachment-name" id="detAttachName">—</div>
                                <a id="detAttachLink" href="#" target="_blank">İndir / Görüntüle →</a>
                            </div>
                        </div>
                        <div class="msg-replies-section" id="detReplies" style="display:none;">
                            <h4><i class="fa-solid fa-reply-all"></i> Yanıtlar</h4>
                            <div id="detRepliesBody"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../../js_files/admin_logic.js" type="module"></script>
</body>
</html>
