<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bellona | Yönetim Paneli</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../js_files/admin.css">
</head>
<body>
    <aside class="sidebar">
        <div class="logo">
            <span class="logo-text">BELLONA HUB</span>
        </div>
        <nav class="sidebar-nav">
            <a href="yonetim.html" class="nav-item active"><i class="fa-solid fa-gauge"></i> Dashboard</a>
            <a href="yonetim_personel.html" class="nav-item"><i class="fa-solid fa-users"></i> Personel Listesi</a>
            <a href="yonetim_ekle.html" class="nav-item"><i class="fa-solid fa-user-plus"></i> Yeni Kayıt</a>
        </nav>
    </aside>

    <main>
        <header>
            <h1>Genel Bakış</h1>
            <div class="user-pill"><i class="fa-solid fa-circle-user"></i> Admin</div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">Toplam Çalışan</span>
                <span class="stat-value" id="statTotal">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">En Kalabalık Bayi</span>
                <span class="stat-value" id="statLargest">-</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Yaklaşan Doğum Günleri</span>
                <span class="stat-value" id="statBirthdays">0</span>
            </div>
        </div>

        <div class="dashboard-content" style="display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem; margin-top: 1.5rem;">
            <!-- Sol: Bölgesel Dağılım -->
            <div class="card">
                <div class="card-header">
                    <h3>Bölgesel Dağılım Analizi</h3>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; padding: 1rem; align-items: center;">
                    <div class="table-wrapper" style="margin-top: 0;">
                        <table>
                            <thead>
                                <tr>
                                    <th>Bölge</th>
                                    <th>Sayı</th>
                                </tr>
                            </thead>
                            <tbody id="regionTableBody">
                                <!-- JS ile dolacak -->
                            </tbody>
                        </table>
                    </div>
                    <div style="position: relative; height: 250px;">
                        <canvas id="regionChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Sağ: Doğum Günü Listesi -->
            <div class="card" style="border-left: 4px solid var(--accent);">
                <div class="card-header">
                    <h3><i class="fa-solid fa-cake-candles" style="color:var(--accent); margin-right:8px;"></i> Yaklaşan Doğum Günleri (1 Ay)</h3>
                </div>
                <div id="upcomingBirthdayList" style="padding: 1rem; max-height: 400px; overflow-y: auto;">
                    <p style="text-align: center; color: var(--text-light); padding: 2rem;">Hesaplanıyor...</p>
                </div>
            </div>
        </div>
    </main>

    <script src="../../js_files/admin_logic.js" type="module"></script>
</body>
</html>
