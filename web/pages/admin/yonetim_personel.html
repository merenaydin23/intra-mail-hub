<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bellona | Personel Listesi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../js_files/admin.css">
</head>
<body>
    <aside class="sidebar">
        <div class="logo">
            <img src="../../assets/bellona-logo.svg" alt="Bellona Logo" class="brand-logo">
        </div>
        <nav class="sidebar-nav">
            <a href="yonetim.html" class="nav-item"><i class="fa-solid fa-gauge"></i> Dashboard</a>
            <a href="yonetim_personel.html" class="nav-item active"><i class="fa-solid fa-users"></i> Personel Listesi</a>
            <a href="yonetim_ekle.html" class="nav-item"><i class="fa-solid fa-user-plus"></i> Yeni Kayıt</a>
            <a href="yonetim_mesajlar.html" class="nav-item"><i class="fa-solid fa-envelope-open-text"></i> Tüm Mesajlar</a>
        </nav>
    </aside>

    <main>
        <header>
            <h1>Personel Yönetimi</h1>
            <div class="header-actions">
                <a href="yonetim_mesajlar.html" class="btn-outline"><i class="fa-solid fa-clock-rotate-left"></i> İşlem Geçmişi</a>
                <a href="yonetim_ekle.html" class="btn-outline"><i class="fa-solid fa-user-plus"></i> Yeni Personel Ekle</a>
            </div>
        </header>

        <!-- Filtreleme Paneli -->
        <div class="card" style="margin-bottom: 1.5rem; padding: 1.5rem;">
            <div class="form-grid" style="grid-template-columns: 2fr 1fr 1fr 1.2fr; gap: 1rem; margin-bottom: 0;">
                <div class="form-group" style="margin-bottom: 0;">
                    <div class="input-box">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="searchUser" placeholder="İsim veya bayi adı ile ara..." />
                    </div>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <select id="filterCategory">
                        <option value="all">Tüm Kategoriler</option>
                        <option value="factory">Fabrika</option>
                        <option value="regional">Bölge Bayisi</option>
                        <option value="local">Yerel Bayi</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <select id="filterRegion">
                        <option value="all">Tüm Bölgeler</option>
                        <option value="Marmara">Marmara</option>
                        <option value="Ege">Ege</option>
                        <option value="İç Anadolu">İç Anadolu</option>
                        <option value="Akdeniz">Akdeniz</option>
                        <option value="Karadeniz">Karadeniz</option>
                        <option value="Doğu Anadolu">Doğu Anadolu</option>
                        <option value="Güneydoğu Anadolu">Güneydoğu Anadolu</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <select id="sortUser">
                        <option value="name-asc">A-Z Sırala</option>
                        <option value="name-desc">Z-A Sırala</option>
                        <option value="newest">En Yeni</option>
                    </select>
                </div>
            </div>
            
            <!-- Küçük Alfabetik Filtreleme -->
            <div class="alphabet-filter" id="alphabetFilter" style="margin-top: 1rem; margin-bottom: 0; padding: 0.5rem; border: none; box-shadow: none;">
                <button class="alpha-btn active" data-letter="all" style="font-size: 0.6rem;">HEPSİ</button>
                <!-- A-Z JS ile buraya dolacak -->
            </div>
        </div>


        <div class="card">
            <div class="card-header">
                <h3>Kayıtlı Tüm Personeller <span id="totalPersonnelCount" class="badge badge-primary" style="margin-left: 10px; font-size: 0.75rem;">0</span></h3>
            </div>
            <div class="table-shell">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Ad Soyad</th>
                            <th>Bayi / Kurum</th>
                            <th>Departman</th>
                            <th>Yetki</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <!-- JS renders here -->
                    </tbody>
                </table>
            </div>
            </div>
        </div>
    </main>

    <script src="../../js_files/admin_logic.js" type="module"></script>
</body>
</html>
