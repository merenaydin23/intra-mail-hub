<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bellona | Personel Listesi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../js_files/admin.css">
    <style>
        /* Watermark */
        .main-watermark {
            position: fixed; bottom: 2rem; right: 2rem;
            width: 200px; opacity: 0.045; pointer-events: none;
            user-select: none; z-index: 0;
        }

        /* Filtre Kartı Revize */
        .filter-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }
        .main-filter-bar {
            display: grid;
            grid-template-columns: 1.5fr 120px 150px auto 40px;
            gap: 0.75rem;
            align-items: center;
        }
        .filter-group { display: flex; flex-direction: column; gap: 0.2rem; }
        .filter-label {
            font-size: 0.65rem; font-weight: 800; color: #94a3b8;
            text-transform: uppercase; letter-spacing: 0.05em;
            margin-left: 0.5rem;
        }
        .f-box {
            display: flex; align-items: center; gap: 0.5rem;
            border: 1.5px solid #f1f5f9; border-radius: 12px;
            padding: 0.5rem 0.85rem; background: #f8fafc;
            transition: all 0.2s;
        }
        .f-box:focus-within { border-color: var(--brand); background: #fff; box-shadow: 0 0 0 4px var(--brand-glow); }
        .f-box i { color: #94a3b8; font-size: 0.8rem; }
        .f-box input, .f-box select {
            border: none; background: transparent; outline: none;
            font-size: 0.85rem; color: #1e293b; width: 100%;
            font-weight: 500;
        }
        
        /* Advanced Panel */
        .advanced-filters {
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.75rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #f1f5f9;
            animation: slideDown 0.3s ease-out forwards;
        }
        .advanced-filters.show { display: grid; }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-toggle-adv {
            background: #fff; border: 1.5px solid #e2e8f0;
            border-radius: 10px; color: #64748b; font-size: 0.8rem;
            font-weight: 700; padding: 0.6rem 1rem; cursor: pointer;
            transition: all 0.2s; display: flex; align-items: center; gap: 0.5rem;
            height: 42px;
        }
        .btn-toggle-adv:hover { border-color: var(--brand); color: var(--brand); background: var(--brand-soft); }
        .btn-toggle-adv.active { background: var(--brand); color: #fff; border-color: var(--brand); }

        .btn-reset {
            width: 42px; height: 42px; border-radius: 10px;
            border: 1.5px solid #f1f5f9; background: #f8fafc;
            color: #94a3b8; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .btn-reset:hover { background: #fee2e2; color: #ef4444; border-color: #fca5a5; }

        /* Tablo Tasarımı */
        .card {
            background: #fff;
            border-radius: 20px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 25px rgba(0,0,0,0.02);
            overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left; padding: 1rem 1.5rem;
            background: #f8fafc; font-size: 0.7rem;
            font-weight: 800; color: #94a3b8;
            text-transform: uppercase; letter-spacing: 0.05em;
            border-bottom: 1.5px solid #f1f5f9;
        }
        td {
            padding: 1rem 1.5rem; border-bottom: 1px solid #f1f5f9;
            font-size: 0.88rem; color: #334155;
            vertical-align: middle;
        }
        tr.personnel-main-row:hover { background: #fbfdfe; }
        tr.personnel-main-row:last-child td { border-bottom: none; }
        
        .personnel-name-wrap strong { color: #1e293b; font-weight: 700; }
        .badge-role {
            font-size: 0.65rem; font-weight: 800;
            padding: 4px 10px; border-radius: 8px;
            display: inline-flex; align-items: center; gap: 4px;
        }
        .badge-role-manager { background: #ecfdf5; color: #059669; }
        .badge-role-employee { background: #f1f5f9; color: #475569; }

        .detail-chevron { color: #cbd5e1; font-size: 0.6rem; margin-right: 0.5rem; transition: 0.2s; }
        .is-open .detail-chevron { transform: rotate(90deg); color: var(--brand); }

        /* Sonuç satırı & Chips */
        .result-bar {
            display: flex; align-items: center; justify-content: space-between;
            margin-top: 0.5rem; margin-bottom: 1.25rem; padding: 0 0.5rem;
        }
        .result-bar h3 { font-size: 1rem; font-weight: 800; color: #1e293b; }
        .result-bar .count-badge {
            background: var(--brand); color: #fff; border-radius: 8px;
            padding: 2px 8px; font-size: 0.75rem; font-weight: 800; margin-left: 6px;
        }
        .chips-row { display: flex; gap: 0.45rem; flex-wrap: wrap; }
        .chip {
            display: inline-flex; align-items: center; gap: 0.35rem;
            background: #f1f7f7; border: 1px solid #d7e7ea;
            border-radius: 20px; padding: 0.25rem 0.8rem;
            font-size: 0.72rem; font-weight: 700; color: var(--brand);
            cursor: pointer; transition: 0.2s;
        }
        .chip:hover { background: #e8f4f4; border-color: var(--brand); }
        .chip i { font-size: 0.65rem; opacity: 0.8; }
    </style>
</head>
<body>
    <!-- Şeffaf Watermark -->
    <img src="../../assets/bellona-logo.svg" class="main-watermark" alt="">

    <aside class="sidebar">
        <div class="logo">
            <img src="../../assets/bellona-logo.svg" alt="Bellona Logo" class="brand-logo">
        </div>
        <nav class="sidebar-nav">
            <a href="yonetim.html" class="nav-item"><i class="fa-solid fa-gauge"></i> Dashboard</a>
            <a href="yonetim_personel.html" class="nav-item active"><i class="fa-solid fa-users"></i> Personel Listesi</a>
            <a href="yonetim_ekle.html" class="nav-item"><i class="fa-solid fa-user-plus"></i> Yeni Kayıt</a>
            <a href="yonetim_mesajlar.html" class="nav-item"><i class="fa-solid fa-envelope-open-text"></i> Tüm Mesajlar</a>
            <div class="sidebar-logout">
                <a href="../../index.html" class="nav-item" style="color:#ef4444;">
                    <i class="fa-solid fa-right-from-bracket"></i> Çıkış Yap
                </a>
            </div>
        </nav>
    </aside>

    <main>
        <header>
            <div>
                <h1>Personel Yönetimi</h1>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 0.4rem;">Kurumsal personel listesini yönetin ve yeni kayıtlar oluşturun.</p>
            </div>
            <div class="header-actions">
                <a href="yonetim_mesajlar.html" class="btn-outline">
                    <i class="fa-solid fa-clock-rotate-left"></i> İşlem Geçmişi
                </a>
                <a href="yonetim_ekle.html" class="btn-outline" style="background: var(--brand); color: white; border-color: var(--brand);">
                    <i class="fa-solid fa-plus"></i> Yeni Personel
                </a>
            </div>
        </header>

        <div class="filter-card">
            <div class="main-filter-bar">
                <div class="filter-group">
                    <div class="f-box">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="searchUser" placeholder="İsim, bayi veya e-posta ile ara..." />
                    </div>
                </div>
                <div class="filter-group">
                    <div class="f-box">
                        <select id="filterCategory">
                            <option value="all">Tüm Birimler</option>
                            <option value="factory">Fabrika</option>
                            <option value="regional">Bölge Bayisi</option>
                            <option value="local">Yerel Bayi</option>
                        </select>
                    </div>
                </div>
                <div class="filter-group">
                    <div class="f-box">
                        <select id="filterRegion">
                            <option value="all">Tüm Bölgeler</option>
                            <option value="Marmara">Marmara</option>
                            <option value="Ege">Ege</option>
                            <option value="İç Anadolu">İç Anadolu</option>
                            <option value="Akdeniz">Akdeniz</option>
                            <option value="Karadeniz">Karadeniz</option>
                            <option value="Doğu Anadolu">Doğu Anadolu</option>
                            <option value="Güneydoğu Anadolu">Güneydoğu Anadolu</option>
                        </select>
                    </div>
                </div>
                <button class="btn-toggle-adv" id="btnToggleAdvanced">
                    <i class="fa-solid fa-sliders"></i> Gelişmiş
                </button>
                <button class="btn-reset" id="btnResetFilters" title="Sıfırla">
                    <i class="fa-solid fa-rotate-left"></i>
                </button>
            </div>

            <!-- Advanced Panel -->
            <div class="advanced-filters" id="advancedFilters">
                <div class="filter-group">
                    <div class="filter-label">Şehir</div>
                    <div class="f-box">
                        <i class="fa-solid fa-city"></i>
                        <select id="filterCity" disabled>
                            <option value="all">Tümü</option>
                        </select>
                    </div>
                </div>
                <div class="filter-group">
                    <div class="filter-label">Bayi</div>
                    <div class="f-box">
                        <i class="fa-solid fa-store"></i>
                        <select id="filterDealer" disabled>
                            <option value="all">Tümü</option>
                        </select>
                    </div>
                </div>
                <div class="filter-group">
                    <div class="filter-label">Yetki</div>
                    <div class="f-box">
                        <i class="fa-solid fa-user-shield"></i>
                        <select id="filterRole">
                            <option value="all">Tümü</option>
                            <option value="manager">Patron / Müdür</option>
                            <option value="employee">Çalışan</option>
                        </select>
                    </div>
                </div>
                <div class="filter-group">
                    <div class="filter-label">Sıralama</div>
                    <div class="f-box">
                        <i class="fa-solid fa-arrow-down-a-z"></i>
                        <select id="sortUser">
                            <option value="name-asc">A → Z</option>
                            <option value="name-desc">Z → A</option>
                            <option value="newest">En Yeni</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- SONUÇ SATIRI -->
        <div class="result-bar">
            <h3>
                Personeller
                <span class="count-badge" id="totalPersonnelCount">0</span>
            </h3>
            <div class="chips-row" id="activeChips"></div>
        </div>

        <!-- TABLO -->
        <div class="card">
            <div class="table-shell">
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Ad Soyad</th>
                                <th>Bayi / Kurum</th>
                                <th>Departman</th>
                                <th>Yetki</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="../../js_files/admin_logic.js" type="module"></script>
</body>
</html>
