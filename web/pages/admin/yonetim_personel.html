<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bellona | Personel Listesi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../js_files/admin.css">
    <style>
        /* Watermark */
        .main-watermark {
            position: fixed; bottom: 2rem; right: 2rem;
            width: 200px; opacity: 0.045; pointer-events: none;
            user-select: none; z-index: 0;
        }

        /* Filtre Kartı */
        .filter-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1.25rem;
            box-shadow: 0 1px 8px rgba(0,0,0,0.04);
        }
        .filter-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 44px;
            gap: 0.75rem;
            align-items: end;
        }
        .filter-group { display: flex; flex-direction: column; gap: 0.3rem; }
        .filter-label {
            font-size: 0.7rem; font-weight: 700; color: #94a3b8;
            text-transform: uppercase; letter-spacing: 0.05em;
        }
        .f-box {
            display: flex; align-items: center; gap: 0.5rem;
            border: 1.5px solid #e2e8f0; border-radius: 10px;
            padding: 0.6rem 0.85rem; background: #f8fafc;
            transition: border-color 0.18s, background 0.18s;
        }
        .f-box:focus-within { border-color: #007b7b; background: #fff; }
        .f-box i { color: #b0bec5; font-size: 0.82rem; flex-shrink: 0; }
        .f-box input, .f-box select {
            border: none; background: transparent; outline: none;
            font-size: 0.85rem; color: #1e293b; width: 100%;
        }
        .f-box select:disabled { color: #cbd5e1; cursor: not-allowed; }

        /* İkinci filtre satırı: Şehir + Bayi + Yetki */
        .filter-row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0.75rem;
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid #f1f5f9;
        }

        /* Sıfırla butonu */
        .btn-reset {
            width: 44px; height: 44px; border-radius: 10px;
            border: 1.5px solid #e2e8f0; background: #f8fafc;
            color: #94a3b8; cursor: pointer; font-size: 0.9rem;
            transition: all 0.18s; display: flex; align-items: center; justify-content: center;
            align-self: end;
        }
        .btn-reset:hover { border-color: #ef4444; color: #ef4444; background: #fff5f5; }
        .btn-reset.has-filter { border-color: #ef4444; color: #ef4444; background: #fff5f5; }

        /* Sonuç satırı */
        .result-bar {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 1rem;
        }
        .result-bar h3 { font-size: 0.95rem; font-weight: 700; color: #1e293b; }
        .result-bar .count-badge {
            display: inline-flex; align-items: center; justify-content: center;
            background: #007b7b; color: #fff; border-radius: 20px;
            padding: 2px 10px; font-size: 0.75rem; font-weight: 700; margin-left: 8px;
        }

        /* Aktif chip'ler */
        .chips-row { display: flex; gap: 0.45rem; flex-wrap: wrap; }
        .chip {
            display: inline-flex; align-items: center; gap: 0.35rem;
            background: #f0fdfd; border: 1px solid #99f6e4;
            border-radius: 20px; padding: 0.22rem 0.7rem;
            font-size: 0.72rem; font-weight: 600; color: #007b7b;
            cursor: pointer; transition: background 0.15s;
        }
        .chip:hover { background: #ccfbf1; }
        .chip i { font-size: 0.6rem; opacity: 0.7; }
    </style>
</head>
<body>
    <!-- Şeffaf Watermark -->
    <img src="../../assets/bellona-logo.svg" class="main-watermark" alt="">

    <aside class="sidebar">
        <div class="logo">
            <img src="../../assets/bellona-logo.svg" alt="Bellona Logo" class="brand-logo">
        </div>
        <nav class="sidebar-nav">
            <a href="yonetim.html" class="nav-item"><i class="fa-solid fa-gauge"></i> Dashboard</a>
            <a href="yonetim_personel.html" class="nav-item active"><i class="fa-solid fa-users"></i> Personel Listesi</a>
            <a href="yonetim_ekle.html" class="nav-item"><i class="fa-solid fa-user-plus"></i> Yeni Kayıt</a>
            <a href="yonetim_mesajlar.html" class="nav-item"><i class="fa-solid fa-envelope-open-text"></i> Tüm Mesajlar</a>
            <div class="sidebar-logout">
                <a href="../../index.html" class="nav-item" style="color:#ef4444;">
                    <i class="fa-solid fa-right-from-bracket"></i> Çıkış Yap
                </a>
            </div>
        </nav>
    </aside>

    <main>
        <header>
            <h1>Personel Yönetimi</h1>
            <div class="header-actions">
                <a href="yonetim_mesajlar.html" class="btn-outline">
                    <i class="fa-solid fa-clock-rotate-left"></i> İşlem Geçmişi
                </a>
                <a href="yonetim_ekle.html" class="btn-outline">
                    <i class="fa-solid fa-user-plus"></i> Yeni Personel Ekle
                </a>
            </div>
        </header>

        <!-- FİLTRE KARTI -->
        <div class="filter-card">
            <!-- Satır 1: Arama + Kategori + Bölge + Sıralama + Sıfırla -->
            <div class="filter-row">
                <div class="filter-group">
                    <div class="filter-label">Arama</div>
                    <div class="f-box">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="searchUser" placeholder="İsim, bayi, e-posta..." />
                    </div>
                </div>
                <div class="filter-group">
                    <div class="filter-label">Kategori</div>
                    <div class="f-box">
                        <i class="fa-solid fa-sitemap"></i>
                        <select id="filterCategory">
                            <option value="all">Tümü</option>
                            <option value="factory">Fabrika</option>
                            <option value="regional">Bölge Bayisi</option>
                            <option value="local">Yerel Bayi</option>
                        </select>
                    </div>
                </div>
                <div class="filter-group">
                    <div class="filter-label">Bölge</div>
                    <div class="f-box">
                        <i class="fa-solid fa-map-location-dot"></i>
                        <select id="filterRegion">
                            <option value="all">Tüm Bölgeler</option>
                            <option value="Marmara">Marmara</option>
                            <option value="Ege">Ege</option>
                            <option value="İç Anadolu">İç Anadolu</option>
                            <option value="Akdeniz">Akdeniz</option>
                            <option value="Karadeniz">Karadeniz</option>
                            <option value="Doğu Anadolu">Doğu Anadolu</option>
                            <option value="Güneydoğu Anadolu">Güneydoğu Anadolu</option>
                        </select>
                    </div>
                </div>
                <div class="filter-group">
                    <div class="filter-label">Sıralama</div>
                    <div class="f-box">
                        <i class="fa-solid fa-arrow-down-a-z"></i>
                        <select id="sortUser">
                            <option value="name-asc">A → Z</option>
                            <option value="name-desc">Z → A</option>
                            <option value="newest">En Yeni</option>
                        </select>
                    </div>
                </div>
                <button class="btn-reset" id="btnResetFilters" title="Filtreleri Sıfırla">
                    <i class="fa-solid fa-rotate-left"></i>
                </button>
            </div>

            <!-- Satır 2: Şehir + Bayi + Yetki (dinamik) -->
            <div class="filter-row-2">
                <div class="filter-group">
                    <div class="filter-label">Şehir</div>
                    <div class="f-box">
                        <i class="fa-solid fa-city"></i>
                        <select id="filterCity" disabled>
                            <option value="all">Önce bölge seçin</option>
                        </select>
                    </div>
                </div>
                <div class="filter-group">
                    <div class="filter-label">Bayi</div>
                    <div class="f-box">
                        <i class="fa-solid fa-store"></i>
                        <select id="filterDealer" disabled>
                            <option value="all">Önce şehir seçin</option>
                        </select>
                    </div>
                </div>
                <div class="filter-group">
                    <div class="filter-label">Yetki</div>
                    <div class="f-box">
                        <i class="fa-solid fa-user-shield"></i>
                        <select id="filterRole">
                            <option value="all">Tüm Yetkiler</option>
                            <option value="manager">Patron / Müdür</option>
                            <option value="employee">Çalışan</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- SONUÇ SATIRI -->
        <div class="result-bar">
            <h3>
                Personeller
                <span class="count-badge" id="totalPersonnelCount">0</span>
            </h3>
            <div class="chips-row" id="activeChips"></div>
        </div>

        <!-- TABLO -->
        <div class="card">
            <div class="table-shell">
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Ad Soyad</th>
                                <th>Bayi / Kurum</th>
                                <th>Departman</th>
                                <th>Yetki</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="../../js_files/admin_logic.js" type="module"></script>
</body>
</html>
