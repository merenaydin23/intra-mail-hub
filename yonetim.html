<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bellona | Admin Ana Menü</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="src/admin.css">
  <style>
    body {
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      padding: 2rem;
    }
    .landing-container {
      max-width: 1200px;
      width: 100%;
      text-align: center;
    }
    .landing-header {
      margin-bottom: 4rem;
      animation: fadeInDown 0.8s ease-out;
    }
    .landing-header h1 {
      font-family: 'Outfit';
      font-size: 3.5rem;
      color: white;
      font-weight: 800;
      letter-spacing: -2px;
      margin-bottom: 1rem;
    }
    .landing-header p {
      color: #94a3b8;
      font-size: 1.2rem;
      font-weight: 500;
    }
    .branch-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2.5rem;
      animation: fadeInUp 1s ease-out;
    }
    .branch-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1.5px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius-xl);
      padding: 3rem 2rem;
      text-decoration: none;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      position: relative;
      overflow: hidden;
    }
    .branch-card:hover {
      background: var(--primary);
      border-color: var(--primary-light);
      transform: translateY(-15px) scale(1.02);
      box-shadow: 0 40px 80px -20px rgba(67, 56, 202, 0.5);
    }
    .branch-card i {
      font-size: 4rem;
      color: var(--primary-light);
      transition: all 0.4s;
    }
    .branch-card:hover i {
      color: white;
      transform: scale(1.2);
    }
    .branch-card h3 {
      font-family: 'Outfit';
      font-size: 1.8rem;
      color: white;
      font-weight: 800;
    }
    .branch-card p {
      color: #94a3b8;
      font-size: 1rem;
      font-weight: 500;
      transition: 0.3s;
    }
    .branch-card:hover p { color: rgba(255,255,255,0.8); }

    .logout-corner {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="landing-container">
    <div class="landing-header">
      <h1>Sistem Yönetim Merkezi</h1>
      <p>Lütfen yönetmek istediğiniz operasyon dalını seçin.</p>
    </div>

    <div class="branch-grid">
      <!-- DAL 1: DASHBOARD -->
      <a href="yonetim_dashboard.html" class="branch-card">
        <i class="fa-solid fa-chart-line"></i>
        <h3>Dashboard</h3>
        <p>İstatistikler ve Genel Sistem Durumu</p>
      </a>

      <!-- DAL 2: PERSONEL LİSTESİ -->
      <a href="yonetim_personel.html" class="branch-card">
        <i class="fa-solid fa-id-card-clip"></i>
        <h3>Personel Yönetimi</h3>
        <p>TC, Doğum Tarihi ve Şifre Kontrol Merkezi</p>
      </a>

      <!-- DAL 3: YENİ PERSONEL -->
      <a href="yonetim_ekle.html" class="branch-card">
        <i class="fa-solid fa-user-plus"></i>
        <h3>Yeni Personel Kaydı</h3>
        <p>Sisteme Yeni Kurumsal Hesap Tanımlama</p>
      </a>

      <!-- DAL 4: MESAJLAR -->
      <a href="yonetim_mesajlar.html" class="branch-card">
        <i class="fa-solid fa-envelope-open-text"></i>
        <h3>Sistem Mesajları</h3>
        <p>B2B ve Şube İçi Haberleşme Arşivi</p>
      </a>
    </div>
  </div>

  <div class="logout-corner">
    <button class="btn-submit-premium" id="logoutBtn" style="background:var(--danger); box-shadow:none; padding:1rem 2rem;">
      <i class="fa-solid fa-power-off"></i> Güvenli Çıkış
    </button>
  </div>

  <script src="src/admin_logic.js" type="module"></script>
</body>
</html>
